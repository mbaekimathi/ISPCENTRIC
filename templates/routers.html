{% extends "base.html" %}

{% block page_title %}All Routers{% endblock %}

{% block content %}
  <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 md:px-8">
    <div class="rounded-2xl border border-slate-200 bg-gradient-to-br from-white to-slate-50/50 p-6 shadow-lg shadow-slate-200/50 dark:border-slate-700 dark:from-slate-800 dark:to-slate-900/50 dark:shadow-slate-900/50 sm:p-8">
      <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Registered Routers</h2>
          <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">Search, filter, and manage PPPoE accounts.</p>
        </div>
        <a class="inline-flex items-center justify-center rounded-xl border border-emerald-500 bg-gradient-to-r from-emerald-500 to-emerald-600 px-6 py-3 text-sm font-semibold text-white shadow-md shadow-emerald-500/25 transition-all hover:from-emerald-600 hover:to-emerald-700 hover:shadow-lg hover:shadow-emerald-500/30 hover:-translate-y-0.5 active:scale-95 dark:shadow-emerald-900/50 touch-manipulation whitespace-nowrap" href="{{ url_for('register_router_page') }}">
          Register Router
        </a>
      </div>

      <div class="mb-6 grid gap-4 sm:grid-cols-1 md:grid-cols-[1.5fr_0.5fr_0.5fr_0.5fr]">
        <input
          id="searchInput"
          class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20"
          type="text"
          placeholder="Search by name, phone, or username"
        />
        <select
          id="statusFilter"
          class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20"
        >
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="suspended">Suspended</option>
        </select>
        <select
          id="connectionFilter"
          class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20"
        >
          <option value="all">All Connections</option>
          <option value="connected">Connected</option>
          <option value="offline">Offline</option>
        </select>
        <select
          id="sortSelect"
          class="rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20"
        >
          <option value="customer_name" selected>Sort by Name (A-Z)</option>
          <option value="created_at">Sort by Date</option>
          <option value="status">Sort by Status</option>
        </select>
      </div>

      <div class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm dark:border-slate-700" style="max-height: 70vh; overflow-y: auto;">
        <table class="min-w-full divide-y divide-slate-200 text-left text-sm dark:divide-slate-700">
          <thead class="bg-gradient-to-r from-slate-50 to-slate-100 dark:from-slate-800 dark:to-slate-900 sticky top-0 z-10">
            <tr>
              <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-300">Customer & Details</th>
              <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-300 hidden sm:table-cell">Phone Number</th>
              <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-300">Connection</th>
              <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-300 hidden md:table-cell">Registered Date</th>
              <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-300">Actions</th>
            </tr>
          </thead>
          <tbody id="routerTable" class="divide-y divide-slate-200 bg-white dark:divide-slate-700 dark:bg-slate-800"></tbody>
        </table>
      </div>

      <div class="mt-4 text-sm">
        <span id="paginationInfo" class="text-slate-600 dark:text-slate-400">Total: 0 routers</span>
      </div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/70 px-4 backdrop-blur-sm dark:bg-slate-950/70">
    <div class="w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-6 shadow-xl dark:border-slate-700 dark:bg-slate-800 sm:p-8">
      <div class="mb-4 flex items-center justify-between">
        <h3 id="modalTitle" class="text-2xl font-bold text-slate-900 dark:text-white">Details</h3>
        <button id="modalClose" class="rounded-lg p-1.5 text-slate-400 transition-all hover:bg-slate-100 hover:text-slate-600 active:scale-95 dark:hover:bg-slate-700 dark:hover:text-slate-300">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div id="modalBody" class="text-sm text-slate-600 dark:text-slate-400"></div>
      <div id="modalActions" class="mt-6 flex justify-end gap-3"></div>
    </div>
  </div>

  <div id="toast" class="pointer-events-none fixed right-6 top-6 z-50 hidden rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 shadow-lg dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100"></div>

  <script>
    const tableBody = document.getElementById("routerTable");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const connectionFilter = document.getElementById("connectionFilter");
    const sortSelect = document.getElementById("sortSelect");
    const paginationInfo = document.getElementById("paginationInfo");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalActions = document.getElementById("modalActions");
    const toast = document.getElementById("toast");

    let routers = [];

    const showToast = (message, isError = false) => {
      toast.textContent = message;
      toast.classList.remove("hidden");
      if (isError) {
        toast.classList.add("border-red-500", "bg-red-50", "text-red-800", "dark:border-red-800", "dark:bg-red-900/20", "dark:text-red-300");
        toast.classList.remove("border-slate-200", "bg-white", "text-slate-900", "dark:border-slate-700", "dark:bg-slate-800", "dark:text-slate-100");
      } else {
        toast.classList.add("border-emerald-500", "bg-emerald-50", "text-emerald-800", "dark:border-emerald-800", "dark:bg-emerald-900/20", "dark:text-emerald-300");
        toast.classList.remove("border-slate-200", "bg-white", "text-slate-900", "dark:border-slate-700", "dark:bg-slate-800", "dark:text-slate-100");
      }
      setTimeout(() => {
        toast.classList.add("hidden");
        toast.classList.remove("border-red-500", "bg-red-50", "text-red-800", "dark:border-red-800", "dark:bg-red-900/20", "dark:text-red-300", "border-emerald-500", "bg-emerald-50", "text-emerald-800", "dark:border-emerald-800", "dark:bg-emerald-900/20", "dark:text-emerald-300");
      }, 3000);
    };

    const fetchRouters = async () => {
      const response = await fetch("/api/routers");
      if (!response.ok) {
        showToast("Failed to fetch routers.", true);
        return;
      }
      routers = await response.json();
      renderTable();
    };

    const renderTable = () => {
      const query = searchInput.value.toLowerCase();
      let filtered = routers.filter((router) => {
        const haystack = `${router.customer_name} ${router.phone_number} ${router.pppoe_username}`.toLowerCase();
        const matchesQuery = haystack.includes(query);
        const matchesStatus = statusFilter.value === "all" || router.status === statusFilter.value;
        const matchesConnection = connectionFilter.value === "all" || 
          (connectionFilter.value === "connected" && router.is_connected) ||
          (connectionFilter.value === "offline" && !router.is_connected);
        return matchesQuery && matchesStatus && matchesConnection;
      });

      filtered.sort((a, b) => {
        const field = sortSelect.value;
        if (field === "created_at") {
          return new Date(b.created_at) - new Date(a.created_at);
        }
        return String(a[field]).localeCompare(String(b[field]));
      });

      const total = filtered.length;

      tableBody.innerHTML = "";
      filtered.forEach((router) => {
        const statusBadge = router.status === "active"
          ? '<span class="inline-flex items-center rounded-full border border-emerald-200 bg-gradient-to-r from-emerald-50 to-emerald-50/50 px-2 py-0.5 text-xs font-semibold text-emerald-700 shadow-sm dark:border-emerald-800/50 dark:from-emerald-900/30 dark:to-emerald-900/20 dark:text-emerald-300">Active</span>'
          : '<span class="inline-flex items-center rounded-full border border-red-200 bg-gradient-to-r from-red-50 to-red-50/50 px-2 py-0.5 text-xs font-semibold text-red-700 shadow-sm dark:border-red-800/50 dark:from-red-900/30 dark:to-red-900/20 dark:text-red-300">Suspended</span>';
        
        const connectionBadge = router.is_connected
          ? '<span class="inline-flex items-center rounded-full border border-emerald-200 bg-gradient-to-r from-emerald-50 to-emerald-50/50 px-2 py-0.5 text-xs font-semibold text-emerald-700 shadow-sm dark:border-emerald-800/50 dark:from-emerald-900/30 dark:to-emerald-900/20 dark:text-emerald-300"><span class="mr-1 h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>Connected</span>'
          : '<span class="inline-flex items-center rounded-full border border-slate-200 bg-slate-100 px-2 py-0.5 text-xs font-semibold text-slate-600 shadow-sm dark:border-slate-700 dark:bg-slate-800 dark:text-slate-400">Offline</span>';
        
        tableBody.insertAdjacentHTML(
          "beforeend",
          `<tr class="transition-colors hover:bg-slate-50/80 dark:hover:bg-slate-700/50">
            <td class="px-4 py-3">
              <div class="flex flex-col gap-2">
                <div class="font-semibold text-slate-900 dark:text-slate-100">${router.customer_name}</div>
                <div class="flex flex-wrap items-center gap-2 text-sm">
                  <span class="text-slate-600 dark:text-slate-400">@${router.pppoe_username}</span>
                  ${statusBadge}
                </div>
              </div>
            </td>
            <td class="px-4 py-3 text-slate-700 dark:text-slate-300 hidden sm:table-cell">${router.phone_number}</td>
            <td class="px-4 py-3">${connectionBadge}</td>
            <td class="px-4 py-3 text-slate-600 dark:text-slate-400 hidden md:table-cell">${new Date(router.created_at).toLocaleString()}</td>
            <td class="px-4 py-3">
              <div class="flex flex-wrap gap-2">
                <button class="rounded-lg border border-emerald-500 bg-emerald-500 px-3 py-1.5 text-xs font-semibold text-white transition-all hover:bg-emerald-600 active:scale-95 touch-manipulation" data-action="view" data-id="${router.id}">View</button>
                <button class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 transition-all hover:border-emerald-300 hover:bg-emerald-50/50 hover:text-emerald-700 active:scale-95 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:border-emerald-700 dark:hover:bg-emerald-900/20 dark:hover:text-emerald-300 touch-manipulation" data-action="edit" data-id="${router.id}">Edit</button>
                <button class="rounded-lg border border-amber-500 bg-amber-500 px-3 py-1.5 text-xs font-semibold text-white transition-all hover:bg-amber-600 active:scale-95 touch-manipulation" data-action="toggle" data-id="${router.id}" data-status="${router.status}">
                  ${router.status === "active" ? "Suspend" : "Activate"}
                </button>
                <button class="rounded-lg border border-red-500 bg-red-500 px-3 py-1.5 text-xs font-semibold text-white transition-all hover:bg-red-600 active:scale-95 touch-manipulation" data-action="delete" data-id="${router.id}">Delete</button>
              </div>
            </td>
          </tr>`
        );
      });

      paginationInfo.textContent = `Total: ${total} router${total !== 1 ? 's' : ''}`;
    };

    const openModal = (title, body, actions = "") => {
      modalTitle.textContent = title;
      modalBody.innerHTML = body;
      modalActions.innerHTML = actions;
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    };

    const closeModal = () => {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    };

    document.getElementById("modalClose").addEventListener("click", closeModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) closeModal();
    });

    tableBody.addEventListener("click", async (event) => {
      const action = event.target.dataset.action;
      const id = event.target.dataset.id;
      if (!action || !id) return;

      if (action === "view") {
        const response = await fetch(`/api/routers/${id}`);
        const data = await response.json();
        openModal(
          "Router Details",
          `<div class="space-y-3">
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/50">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Customer Name</p>
              <p class="mt-1 text-base font-semibold text-slate-900 dark:text-white">${data.customer_name}</p>
            </div>
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/50">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Phone Number</p>
              <p class="mt-1 text-base font-semibold text-slate-900 dark:text-white">${data.phone_number}</p>
            </div>
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/50">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">PPPoE Username</p>
              <p class="mt-1 text-base font-semibold text-slate-900 dark:text-white">${data.pppoe_username}</p>
            </div>
            <div class="rounded-xl border border-slate-200 bg-slate-50 p-4 dark:border-slate-700 dark:bg-slate-900/50">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">PPPoE Password</p>
              <p class="mt-1 text-base font-semibold text-slate-900 dark:text-white">${data.pppoe_password}</p>
            </div>
          </div>`,
          `<button class="rounded-xl border border-slate-300 bg-white px-6 py-3 text-sm font-semibold text-slate-700 shadow-sm transition-all hover:border-emerald-300 hover:bg-emerald-50/50 hover:text-emerald-700 hover:shadow-md active:scale-95 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300 dark:hover:border-emerald-700 dark:hover:bg-emerald-900/20 dark:hover:text-emerald-300 touch-manipulation" onclick="window.open('/routers/${id}/print', '_blank')">Print Setup Instructions</button>`
        );
      }

      if (action === "edit") {
        const response = await fetch(`/api/routers/${id}`);
        const data = await response.json();
        openModal(
          "Edit Router",
          `<form id="editForm" class="space-y-4">
            <div>
              <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-600 dark:text-slate-400">Customer Name</label>
              <input type="text" name="customer_name" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20" value="${data.customer_name}" required />
            </div>
            <div>
              <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-600 dark:text-slate-400">Phone Number</label>
              <input type="text" name="phone_number" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20" value="${data.phone_number}" required />
            </div>
            <div>
              <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-600 dark:text-slate-400">PPPoE Username</label>
              <input type="text" name="pppoe_username" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20" value="${data.pppoe_username}" required />
            </div>
            <div>
              <label class="mb-2 block text-xs font-semibold uppercase tracking-wider text-slate-600 dark:text-slate-400">PPPoE Password</label>
              <input type="text" name="pppoe_password" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20" value="${data.pppoe_password}" required />
            </div>
          </form>`,
          `<button id="saveEdit" class="rounded-xl border border-emerald-500 bg-gradient-to-r from-emerald-500 to-emerald-600 px-6 py-3 text-sm font-semibold text-white shadow-md shadow-emerald-500/25 transition-all hover:from-emerald-600 hover:to-emerald-700 hover:shadow-lg hover:shadow-emerald-500/30 hover:-translate-y-0.5 active:scale-95 dark:shadow-emerald-900/50 touch-manipulation">Save Changes</button>`
        );
        document.getElementById("saveEdit").addEventListener("click", async () => {
          const form = document.getElementById("editForm");
          const payload = Object.fromEntries(new FormData(form));
          const updateResponse = await fetch(`/api/routers/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const updateData = await updateResponse.json();
          if (!updateResponse.ok) {
            showToast(updateData.error || "Update failed.", true);
            return;
          }
          showToast("Router updated.");
          closeModal();
          fetchRouters();
        });
      }

      if (action === "toggle") {
        const currentStatus = event.target.dataset.status;
        const endpoint = currentStatus === "active" ? "suspend" : "activate";
        const response = await fetch(`/api/routers/${id}/${endpoint}`, { method: "POST" });
        const data = await response.json();
        if (!response.ok) {
          showToast(data.error || "Action failed.", true);
          return;
        }
        showToast(data.message);
        fetchRouters();
      }

      if (action === "delete") {
        openModal(
          "Delete Router",
          `<div class="rounded-xl border border-red-200 bg-red-50 p-4 dark:border-red-800/50 dark:bg-red-900/20">
            <p class="text-sm font-semibold text-red-800 dark:text-red-300">Are you sure you want to delete this router?</p>
            <p class="mt-2 text-xs text-red-600 dark:text-red-400">This action cannot be undone.</p>
          </div>`,
          `<button id="confirmDelete" class="rounded-xl border border-red-500 bg-red-500 px-6 py-3 text-sm font-semibold text-white shadow-sm transition-all hover:bg-red-600 hover:shadow-md active:scale-95 touch-manipulation">Delete Router</button>`
        );
        document.getElementById("confirmDelete").addEventListener("click", async () => {
          const response = await fetch(`/api/routers/${id}`, { method: "DELETE" });
          const data = await response.json();
          if (!response.ok) {
            showToast(data.error || "Delete failed.", true);
            return;
          }
          showToast("Router deleted.");
          closeModal();
          fetchRouters();
        });
      }
    });

    searchInput.addEventListener("input", () => {
      renderTable();
    });
    statusFilter.addEventListener("change", () => {
      renderTable();
    });
    connectionFilter.addEventListener("change", () => {
      renderTable();
    });
    sortSelect.addEventListener("change", renderTable);
    
    // Auto-refresh connection status every 30 seconds
    setInterval(() => {
      fetchRouters();
    }, 30000);

    fetchRouters();
  </script>
{% endblock %}
